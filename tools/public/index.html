<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhakti Cards — Content Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,300;1,400&family=Noto+Sans+Devanagari:wght@300;400&family=Noto+Sans+Tamil:wght@300;400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0E0E0E; --surface:#1A1A1A; --border:rgba(255,255,255,0.08);
      --text:rgba(255,255,255,0.88); --muted:rgba(255,255,255,0.38);
      --gold:#C9A84C; --green:#3DA35D; --red:#C0392B;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

    /* ── Topbar ── */
    .topbar {
      position:sticky; top:0; z-index:100;
      background:rgba(14,14,14,0.94); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:13px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    }
    .topbar-title { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; color:var(--gold); white-space:nowrap; }
    .topbar-title span { color:var(--muted); font-size:13px; font-family:Inter; font-weight:400; margin-left:4px; }

    .filters { display:flex; gap:5px; flex-wrap:wrap; }
    .filter-btn {
      padding:5px 12px; border-radius:16px; border:1px solid var(--border);
      background:none; color:var(--muted); font-size:12px; cursor:pointer; transition:all 0.18s;
    }
    .filter-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
    .filter-btn.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:600; }
    .filter-btn .n { font-size:10px; opacity:0.7; }

    .topbar-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .btn-topbar {
      padding:7px 14px; border-radius:6px; font-size:12px; font-weight:500;
      cursor:pointer; transition:all 0.18s; border:1px solid; white-space:nowrap;
    }
    .btn-gen      { background:rgba(201,168,76,0.12); color:var(--gold); border-color:rgba(201,168,76,0.3); }
    .btn-gen:hover { background:rgba(201,168,76,0.22); }
    .btn-update   { background:rgba(61,163,93,0.12); color:var(--green); border-color:rgba(61,163,93,0.3); }
    .btn-update:hover { background:rgba(61,163,93,0.22); }
    .btn-settings { background:none; color:var(--muted); border-color:var(--border); font-size:16px; padding:6px 10px; }
    .btn-settings:hover { color:var(--text); }

    /* ── Grid ── */
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(190px,1fr));
      gap:18px; padding:24px;
    }
    .card-wrap { display:flex; flex-direction:column; gap:8px; }

    /* ── Card preview ── */
    .card-preview {
      width:100%; aspect-ratio:3/5; border-radius:18px; position:relative;
      overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.55); cursor:default;
      transition:transform 0.18s, box-shadow 0.18s;
    }
    .card-preview:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,0,0,0.65); }
    .card-preview.approved { outline:2px solid rgba(61,163,93,0.5); }
    .card-preview.rejected { opacity:0.38; }
    .c-bg   { position:absolute; inset:0; z-index:0; }
    .c-img  { position:absolute; inset:0; z-index:1; }
    .c-img img { width:100%; height:100%; object-fit:cover; object-position:var(--ip,center 10%); }
    .c-scrim {
      position:absolute; inset:0; z-index:2;
      background:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,0) 22%,rgba(0,0,0,.22) 48%,rgba(0,0,0,.78) 72%,rgba(0,0,0,.93) 100%);
    }
    .c-om { position:absolute; inset:0; z-index:1; display:flex; align-items:center; justify-content:center; }
    .c-om-glyph { font-family:'Noto Sans Devanagari',sans-serif; font-size:90px; font-weight:300; color:rgba(255,255,255,0.06); }
    .c-content { position:absolute; inset:0; z-index:3; display:flex; flex-direction:column; padding:0 16px 18px; justify-content:flex-end; }
    .c-divider { display:flex; align-items:center; gap:4px; margin-bottom:9px; }
    .c-line { flex:1; height:1px; background:linear-gradient(to right,transparent,rgba(201,168,76,0.55),transparent); }
    .c-dot  { width:3px; height:3px; border-radius:50%; background:rgba(201,168,76,0.8); }
    .c-dot.sm { width:2px; height:2px; opacity:0.5; }
    .c-script { font-size:12px; font-weight:300; line-height:1.7; color:rgba(255,255,255,0.97); text-align:center; }
    .c-roman  { margin-top:5px; font-family:'Cormorant Garamond',serif; font-size:10.5px; font-style:italic; color:rgba(255,255,255,0.55); text-align:center; line-height:1.5; }
    .c-ref    { margin-top:5px; font-size:8px; letter-spacing:0.08em; color:rgba(201,168,76,0.7); text-align:center; text-transform:uppercase; }
    .c-credit { margin-top:4px; font-size:7.5px; color:rgba(255,255,255,0.22); text-align:center; }
    .c-border { position:absolute; inset:0; border-radius:18px; border:1px solid rgba(201,168,76,0.18); z-index:6; pointer-events:none; }
    .badge {
      position:absolute; top:7px; z-index:7; padding:2px 6px;
      border-radius:8px; font-size:8px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
    }
    .badge-status { right:7px; }
    .badge-type   { left:7px; background:rgba(0,0,0,0.45); color:rgba(255,255,255,0.55); }
    .badge-approved { background:rgba(61,163,93,0.85); color:#fff; }
    .badge-rejected { background:rgba(192,57,43,0.85); color:#fff; }

    /* ── Actions ── */
    .card-actions { display:flex; gap:6px; }
    .btn-av, .btn-rv {
      flex:1; padding:7px 4px; border-radius:7px; border:1px solid;
      font-size:11px; font-weight:600; cursor:pointer; transition:all 0.15s;
    }
    .btn-av { background:rgba(61,163,93,0.12); color:var(--green); border-color:rgba(61,163,93,0.28); }
    .btn-av:hover  { background:rgba(61,163,93,0.24); }
    .btn-av.active { background:var(--green); color:#fff; border-color:var(--green); }
    .btn-rv { background:rgba(192,57,43,0.1); color:var(--red); border-color:rgba(192,57,43,0.22); }
    .btn-rv:hover  { background:rgba(192,57,43,0.22); }
    .btn-rv.active { background:var(--red); color:#fff; border-color:var(--red); }

    .img-edit { display:flex; gap:4px; }
    .img-edit input {
      flex:1; padding:4px 7px; border-radius:5px;
      background:var(--surface); border:1px solid var(--border);
      color:var(--text); font-size:10px; outline:none;
    }
    .img-edit input:focus { border-color:var(--gold); }
    .img-edit button {
      padding:4px 8px; border-radius:5px; border:1px solid var(--border);
      background:var(--surface); color:var(--muted); font-size:10px; cursor:pointer;
    }
    .img-edit button:hover { color:var(--gold); }

    /* ── Empty ── */
    .empty { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--muted); font-size:13px; line-height:2; }
    .empty strong { display:block; font-size:17px; color:var(--text); margin-bottom:8px; }

    /* ── Modal base ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,0.82); align-items:center; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:#1C1C1C; border:1px solid var(--border); border-radius:14px;
      padding:28px; width:min(480px,92vw); display:flex; flex-direction:column; gap:18px;
    }
    .modal h3 { font-size:15px; font-weight:600; color:var(--gold); }
    .modal label { font-size:12px; color:var(--muted); display:block; margin-bottom:5px; }
    .modal input, .modal select {
      width:100%; padding:8px 11px; border-radius:7px;
      background:#111; border:1px solid var(--border); color:var(--text);
      font-size:13px; outline:none;
    }
    .modal input:focus, .modal select:focus { border-color:var(--gold); }
    .modal-row { display:flex; gap:14px; }
    .modal-row > div { flex:1; }
    .modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
    .btn-modal-cancel {
      padding:8px 18px; border-radius:7px; border:1px solid var(--border);
      background:none; color:var(--muted); font-size:13px; cursor:pointer;
    }
    .btn-modal-cancel:hover { color:var(--text); }
    .btn-modal-ok {
      padding:8px 20px; border-radius:7px; border:none;
      background:var(--gold); color:#000; font-size:13px; font-weight:600; cursor:pointer;
    }
    .btn-modal-ok:hover { opacity:0.88; }
    .btn-modal-ok:disabled { opacity:0.4; cursor:not-allowed; }

    /* ── Generation log ── */
    .gen-log {
      background:#0A0A0A; border:1px solid var(--border); border-radius:7px;
      padding:10px 12px; font-family:monospace; font-size:11px; color:rgba(255,255,255,0.6);
      max-height:180px; overflow-y:auto; line-height:1.7; display:none;
    }
    .gen-log.visible { display:block; }
    .gen-log .ok  { color:#3DA35D; }
    .gen-log .err { color:#C0392B; }

    /* ── Update result toast ── */
    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
      background:#1C1C1C; border:1px solid var(--border); border-radius:8px;
      padding:10px 20px; font-size:13px; color:var(--text); opacity:0;
      transition:all 0.3s; z-index:300; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { border-color:rgba(61,163,93,0.5); color:#3DA35D; }
    .toast.error   { border-color:rgba(192,57,43,0.4); color:#e05555; }

    /* key status dots */
    .key-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; }
    .key-dot.set   { background:#3DA35D; }
    .key-dot.unset { background:#555; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Bhakti Cards <span>Content Studio</span></div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-status="all">All <span class="n" id="n-all"></span></button>
    <button class="filter-btn" data-status="pending">Pending <span class="n" id="n-pending"></span></button>
    <button class="filter-btn" data-status="approved">Approved <span class="n" id="n-approved"></span></button>
    <button class="filter-btn" data-status="rejected">Rejected <span class="n" id="n-rejected"></span></button>
  </div>
  <div class="topbar-actions">
    <button class="btn-topbar btn-gen"    onclick="openGenerate()">+ Generate</button>
    <button class="btn-topbar btn-update" onclick="updateApp()">Update Bhakti Cards</button>
    <button class="btn-topbar btn-settings" onclick="openSettings()" title="API keys">⚙</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<!-- ── Generate modal ── -->
<div class="modal-overlay" id="gen-modal">
  <div class="modal">
    <h3>Generate Cards</h3>
    <div>
      <label>Card type</label>
      <select id="gen-type" onchange="toggleGodField()">
        <option value="deity">Deity — portrait + salutation</option>
        <option value="gita">Bhagavad Gita verses</option>
        <option value="upanishad">Upanishad verses</option>
        <option value="all">All types</option>
      </select>
    </div>
    <div id="god-field">
      <label>Deity <span style="color:var(--muted)">(leave blank for all 17)</span></label>
      <select id="gen-god">
        <option value="">All deities</option>
        <option>Ganesha</option><option>Hanuman</option><option>Shiva</option>
        <option>Lakshmi</option><option>Saraswati</option><option>Durga</option>
        <option>Krishna</option><option>Murugan</option><option>Subrahmanya</option>
        <option>Amman</option><option>Venkateswara</option><option>Narasimha</option>
        <option>Ayyappa</option><option>Vitthal</option><option>Kali</option>
        <option>Jagannath</option><option>Raghavendra Swami</option>
      </select>
    </div>
    <div>
      <label>Cards per deity / per type: <strong id="count-label">3</strong></label>
      <input type="range" id="gen-count" min="1" max="10" value="3"
             oninput="document.getElementById('count-label').textContent=this.value"
             style="width:100%;margin-top:6px;accent-color:var(--gold)">
    </div>
    <div class="gen-log" id="gen-log"></div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeGenerate()">Close</button>
      <button class="btn-modal-ok" id="gen-go-btn" onclick="startGenerate()">Generate</button>
    </div>
  </div>
</div>

<!-- ── Settings modal ── -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>API Keys</h3>
    <div>
      <label><span class="key-dot" id="dot-anthropic"></span>Anthropic API Key</label>
      <input type="password" id="key-anthropic" placeholder="sk-ant-...">
    </div>
    <div>
      <label><span class="key-dot" id="dot-openai"></span>OpenAI API Key</label>
      <input type="password" id="key-openai" placeholder="sk-...">
    </div>
    <div>
      <label><span class="key-dot" id="dot-google"></span>Google AI Studio Key</label>
      <input type="password" id="key-google" placeholder="AIza...">
    </div>
    <div>
      <label><span class="key-dot" id="dot-unsplash"></span>Unsplash Access Key <span style="color:var(--muted)">(optional — enables image search)</span></label>
      <input type="password" id="key-unsplash" placeholder="your unsplash access key">
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-modal-ok" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
let allCards = [], currentFilter = 'all';

async function loadCards() {
  allCards = await fetch('/api/cards').then(r=>r.json());
  renderStats(); renderGrid();
}

function renderStats() {
  const c = { all:allCards.length, pending:0, approved:0, rejected:0 };
  allCards.forEach(x => c[x.status]++);
  ['all','pending','approved','rejected'].forEach(s => {
    document.getElementById('n-'+s).textContent = c[s];
  });
}

function renderGrid() {
  const cards = currentFilter==='all' ? allCards : allCards.filter(c=>c.status===currentFilter);
  const grid  = document.getElementById('grid');
  if (!cards.length) {
    grid.innerHTML = `<div class="empty"><strong>No cards here</strong>Click "+ Generate" to create cards.</div>`;
    return;
  }
  grid.innerHTML = cards.map(buildCardHTML).join('');
  cards.forEach(card => {
    document.querySelector(`#wrap-${CSS.escape(card.id)} .btn-av`)?.addEventListener('click', ()=>setStatus(card.id,'approved'));
    document.querySelector(`#wrap-${CSS.escape(card.id)} .btn-rv`)?.addEventListener('click', ()=>setStatus(card.id,'rejected'));
    document.querySelector(`#wrap-${CSS.escape(card.id)} .img-save-btn`)?.addEventListener('click', () => {
      const v = document.querySelector(`#wrap-${CSS.escape(card.id)} .img-url-input`)?.value.trim();
      if (v) updateImage(card.id, v);
    });
  });
}

function buildCardHTML(card) {
  const isDeity = card.type==='deity';
  const bg = card.gradient || 'linear-gradient(170deg,#1A1A1A 0%,#050505 100%)';
  const statusBadge = card.status!=='pending'
    ? `<div class="badge badge-status badge-${card.status}">${card.status}</div>` : '';
  const label = isDeity ? (card.deity||'Deity') : card.type==='gita' ? 'Gita' : 'Upanishad';
  const imgHTML  = isDeity && card.image ? `<div class="c-img"><img src="${card.image}" style="--ip:${card.imgPos||'center 10%'}" onerror="this.style.display='none'"></div>` : '';
  const omHTML   = !isDeity ? `<div class="c-om"><div class="c-om-glyph">ॐ</div></div>` : '';
  const refHTML  = !isDeity && card.reference ? `<div class="c-ref">${card.reference}</div>` : '';
  const credHTML = isDeity && card.imageSource ? `<div class="c-credit">${card.imageSource}</div>` : '';
  const imgEdit  = isDeity ? `<div class="img-edit"><input class="img-url-input" type="text" placeholder="Image URL…" value="${card.image||''}"><button class="img-save-btn">Set</button></div>` : '';
  const fontStyle = `font-family:'${card.font||'Noto Sans Devanagari'}',sans-serif`;
  return `<div class="card-wrap" id="wrap-${card.id}">
  <div class="card-preview ${card.status}" style="background:${bg}">
    <div class="c-bg" style="background:${bg}"></div>
    ${imgHTML}${omHTML}
    <div class="c-scrim"></div>
    <div class="c-content">
      <div class="c-divider"><div class="c-line"></div><div class="c-dot"></div><div class="c-dot sm"></div><div class="c-dot"></div><div class="c-line"></div></div>
      <div class="c-script" style="${fontStyle}">${card.script}</div>
      <div class="c-roman">${card.roman}</div>
      ${refHTML}${credHTML}
    </div>
    <div class="badge badge-type">${label}</div>
    ${statusBadge}
    <div class="c-border"></div>
  </div>
  <div class="card-actions">
    <button class="btn-av ${card.status==='approved'?'active':''}">Approve</button>
    <button class="btn-rv ${card.status==='rejected'?'active':''}">Reject</button>
  </div>
  ${imgEdit}
</div>`;
}

async function setStatus(id, status) {
  await fetch(`/api/cards/${id}/${status}`, {method:'POST'});
  const c = allCards.find(x=>x.id===id); if (c) c.status=status;
  renderStats(); renderGrid();
}

async function updateImage(id, url) {
  const res = await fetch(`/api/cards/${id}/update`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:url})});
  const updated = await res.json();
  const idx = allCards.findIndex(c=>c.id===id); if (idx!==-1) allCards[idx]=updated;
  renderGrid();
}

// ── Filters ──────────────────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn'); if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); currentFilter=btn.dataset.status; renderGrid();
});

// ── Generate ─────────────────────────────────────────────────────────────────
function openGenerate()  { document.getElementById('gen-modal').classList.add('open'); }
function closeGenerate() { if (!document.getElementById('gen-go-btn').disabled) document.getElementById('gen-modal').classList.remove('open'); }
function toggleGodField() {
  const t = document.getElementById('gen-type').value;
  document.getElementById('god-field').style.display = (t==='deity'||t==='all') ? '' : 'none';
}

let pollTimer = null;
async function startGenerate() {
  const type  = document.getElementById('gen-type').value;
  const god   = document.getElementById('gen-god').value;
  const count = document.getElementById('gen-count').value;
  const btn   = document.getElementById('gen-go-btn');
  const log   = document.getElementById('gen-log');

  btn.disabled = true; btn.textContent = 'Generating…';
  log.innerHTML = ''; log.classList.add('visible');

  const res = await fetch('/api/generate', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type, god:god||null, count}),
  });
  if (!res.ok) {
    const err = await res.json();
    log.innerHTML = `<span class="err">${err.error}</span>`;
    btn.disabled=false; btn.textContent='Generate'; return;
  }

  pollTimer = setInterval(async () => {
    const status = await fetch('/api/generate/status').then(r=>r.json());
    log.innerHTML = status.log.map(l =>
      `<div class="${l.startsWith('✓')?'ok':l.startsWith('✗')||l.startsWith('Error')?'err':''}">${l}</div>`
    ).join('');
    log.scrollTop = log.scrollHeight;
    if (status.done) {
      clearInterval(pollTimer);
      btn.disabled=false; btn.textContent='Generate again';
      await loadCards();
    }
  }, 800);
}

// ── Update Bhakti Cards ───────────────────────────────────────────────────────
async function updateApp() {
  const btn = document.querySelector('.btn-update');
  btn.textContent = 'Updating…'; btn.disabled = true;
  try {
    const res  = await fetch('/api/update-app', {method:'POST'});
    const data = await res.json();
    if (data.ok) {
      showToast(data.message, 'success');
    } else {
      showToast(data.error || 'Update failed', 'error');
    }
  } catch(e) { showToast(e.message, 'error'); }
  btn.textContent='Update Bhakti Cards'; btn.disabled=false;
}

// ── Settings ─────────────────────────────────────────────────────────────────
async function openSettings() {
  const s = await fetch('/api/settings').then(r=>r.json());
  document.getElementById('dot-anthropic').className = `key-dot ${s.anthropic_set?'set':'unset'}`;
  document.getElementById('dot-openai').className    = `key-dot ${s.openai_set?'set':'unset'}`;
  document.getElementById('dot-google').className    = `key-dot ${s.google_set?'set':'unset'}`;
  document.getElementById('dot-unsplash').className  = `key-dot ${s.unsplash_set?'set':'unset'}`;
  document.getElementById('key-anthropic').value = '';
  document.getElementById('key-openai').value    = '';
  document.getElementById('key-google').value    = '';
  document.getElementById('key-unsplash').value  = '';
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
async function saveSettings() {
  const a = document.getElementById('key-anthropic').value.trim();
  const o = document.getElementById('key-openai').value.trim();
  const g = document.getElementById('key-google').value.trim();
  const u = document.getElementById('key-unsplash').value.trim();
  if (!a && !o && !g && !u) { closeSettings(); return; }
  await fetch('/api/settings', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({anthropic_key:a,openai_key:o,google_key:g,unsplash_key:u})});
  closeSettings();
  showToast('Keys saved', 'success');
}

// Close modals on overlay click
['gen-modal','settings-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => { if (e.target===e.currentTarget) { if (id==='gen-modal') closeGenerate(); else closeSettings(); }});
});

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>{ t.className=`toast ${type}`; }, 3200);
}

loadCards();
</script>
