<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; background: #ddd; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 12px; }
    canvas { border-radius: 8px; max-width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.3); }
    button { padding: 10px 24px; background: #B5450B; border: none; border-radius: 6px; color: #fff; font-size: 15px; cursor: pointer; font-weight: 600; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,500&family=Noto+Sans+Devanagari:wght@300;400;600&family=Noto+Sans+Tamil:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<button onclick="download()">Download preview.png</button>
<script>
const c   = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1200, H = 630;

// Card definitions — exact replica of app cards
const CARDS = [
  {
    // Back card — Murugan
    image:    'images/murugan.png',
    imgPosY:  0.05,
    gradient: ['#3A1A08','#0D0602'],
    script:   'ஓம் சரவணபவ',
    roman:    'Om Saravanabhava',
    font:     'Noto Sans Tamil',
    x: 740, y: 75, w: 230, h: 383, rot: 0.08,
  },
  {
    // Middle card — Ganesha
    image:    'images/ganesha.png',
    imgPosY:  0.1,
    gradient: ['#2C2C2A','#080807'],
    script:   'ॐ गं गणपतये नमः',
    roman:    'Om Gam Ganapataye Namaha',
    font:     'Noto Sans Devanagari',
    x: 808, y: 52, w: 230, h: 383, rot: -0.05,
  },
  {
    // Front card — Shiva
    image:    'images/shiva.png',
    imgPosY:  0.08,
    gradient: ['#1A1850','#060418'],
    script:   'ॐ नमः शिवाय',
    roman:    'Om Namah Shivaya',
    font:     'Noto Sans Devanagari',
    x: 774, y: 34, w: 230, h: 383, rot: 0.00,
  },
];

function loadImg(src) {
  return new Promise(res => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => res(null); // fallback: no image
    i.src = src;
  });
}

// Fit image cover inside box, anchored to top
function drawCover(img, x, y, w, h, posY = 0.1) {
  if (!img) return;
  const ir = img.width / img.height;
  const br = w / h;
  let dw, dh, dx, dy;
  if (ir > br) {
    dh = h; dw = h * ir;
    dx = x + (w - dw) * 0.5;
    dy = y + (h - dh) * posY;
  } else {
    dw = w; dh = w / ir;
    dx = x;
    dy = y + (h - dh) * posY;
  }
  ctx.drawImage(img, dx, dy, dw, dh);
}

function drawCard(card, img) {
  const { x, y, w, h, rot, gradient, script, roman, font, imgPosY } = card;
  const cx = x + w / 2, cy = y + h / 2;
  const r  = 18;

  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(rot); ctx.translate(-cx, -cy);

  // Drop shadow
  ctx.shadowColor   = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur    = 40;
  ctx.shadowOffsetY = 16;
  roundRect(ctx, x, y, w, h, r);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.shadowColor = 'transparent';

  // Clip to card shape
  roundRect(ctx, x, y, w, h, r);
  ctx.clip();

  // BG gradient
  const bg = ctx.createLinearGradient(x, y, x, y + h);
  bg.addColorStop(0, gradient[0]);
  bg.addColorStop(1, gradient[1]);
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);

  // Deity image
  drawCover(img, x, y, w, h, imgPosY);

  // Scrim
  const scrim = ctx.createLinearGradient(x, y + h * 0.32, x, y + h);
  scrim.addColorStop(0,   'rgba(0,0,0,0.00)');
  scrim.addColorStop(0.35,'rgba(0,0,0,0.20)');
  scrim.addColorStop(0.7, 'rgba(0,0,0,0.78)');
  scrim.addColorStop(1,   'rgba(0,0,0,0.93)');
  ctx.fillStyle = scrim;
  ctx.fillRect(x, y, w, h);

  // Gold divider
  const tx = x + w / 2;
  const divY = y + h * 0.72;
  const dg = ctx.createLinearGradient(tx - 60, 0, tx + 60, 0);
  dg.addColorStop(0,   'rgba(201,168,76,0)');
  dg.addColorStop(0.5, 'rgba(201,168,76,0.85)');
  dg.addColorStop(1,   'rgba(201,168,76,0)');
  ctx.strokeStyle = dg; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(tx - 60, divY); ctx.lineTo(tx + 60, divY); ctx.stroke();

  // Phrase
  ctx.font = `300 17px "${font}"`;
  ctx.fillStyle = 'rgba(255,255,255,0.97)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(script, tx, divY + 10);

  // Transliteration
  ctx.font = 'italic 300 13px "Cormorant Garamond"';
  ctx.fillStyle = 'rgba(255,255,255,0.52)';
  ctx.fillText(roman, tx, divY + 38);

  ctx.restore();

  // Gold border (outside clip)
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(rot); ctx.translate(-cx, -cy);
  roundRect(ctx, x, y, w, h, r);
  ctx.strokeStyle = 'rgba(201,168,76,0.30)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

async function draw() {
  // Load all images in parallel
  const imgs = await Promise.all(CARDS.map(c => loadImg(c.image)));

  // ── Background ───────────────────────────────────────────────
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0,   '#FDF6EC');
  bg.addColorStop(0.5, '#FAF0E0');
  bg.addColorStop(1,   '#F5E8D0');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Warm glow
  const glow = ctx.createRadialGradient(360, 315, 0, 360, 315, 500);
  glow.addColorStop(0,   'rgba(210, 120, 20, 0.10)');
  glow.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // ── Cards (back to front) ────────────────────────────────────
  CARDS.forEach((card, i) => drawCard(card, imgs[i]));

  // ── Vertical separator ───────────────────────────────────────
  const sepG = ctx.createLinearGradient(0, 80, 0, 550);
  sepG.addColorStop(0,   'rgba(180,120,40,0)');
  sepG.addColorStop(0.3, 'rgba(180,120,40,0.32)');
  sepG.addColorStop(0.7, 'rgba(180,120,40,0.32)');
  sepG.addColorStop(1,   'rgba(180,120,40,0)');
  ctx.strokeStyle = sepG; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(708, 80); ctx.lineTo(708, 550); ctx.stroke();

  // ── Left: identity ───────────────────────────────────────────

  // OM
  ctx.font = '600 94px "Noto Sans Devanagari"';
  ctx.fillStyle = '#B5450B';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('ॐ', 72, 72);

  // App name
  ctx.font = '700 108px "Cormorant Garamond"';
  ctx.fillStyle = '#1A0E06';
  ctx.fillText('Bhakti Cards', 66, 182);

  // Underline
  const lineG = ctx.createLinearGradient(68, 0, 580, 0);
  lineG.addColorStop(0,   'rgba(181,69,11,0.85)');
  lineG.addColorStop(0.55,'rgba(201,168,76,0.6)');
  lineG.addColorStop(1,   'rgba(201,168,76,0)');
  ctx.strokeStyle = lineG; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(68, 312); ctx.lineTo(600, 312); ctx.stroke();

  // Tagline
  ctx.font = 'italic 500 46px "Cormorant Garamond"';
  ctx.fillStyle = '#5C2E08';
  ctx.fillText('A moment of devotion, anytime.', 70, 334);

  // URL
  ctx.font = '400 20px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(90,50,10,0.42)';
  ctx.fillText('bhakthicards.online', 74, 418);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function download() {
  const a = document.createElement('a');
  a.download = 'preview.png';
  a.href = c.toDataURL('image/png');
  a.click();
}

document.fonts.ready.then(draw);
</script>
</body>
</html>
